      name: standalone_sleep_timer
      permission: read_write
      type: string
      value: None
      default: None
      options:
      - None
      description: Deprecated in favor of xiltimer
    standalone_stdin:
      name: standalone_stdin
      permission: read_write
      type: string
      value: psu_uart_0
      default: psu_uart_0
      options:
      - None
      - axi_uartlite_0
      - psu_uart_0
      - psu_uart_1
      - psu_coresight_0
      description: stdin peripheral
    standalone_stdout:
